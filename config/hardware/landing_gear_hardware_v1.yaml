# P19.15: Landing Gear Hardware Parameters
kind: "hardware_schema"
version: "1.0"
system_id: "landing-gear"

sensor:
  radio_altitude_ft:
    min: 0.0
    max: 50.0
    unit: "ft"
  gear_position:
    min: 0.0
    max: 100.0
    unit: "percent"
  pilot_handle:
    min: 0.0
    max: 1.0
    unit: "bool"
  squat_switch:
    min: 0.0
    max: 1.0
    unit: "bool"
  door_closed:
    min: 0.0
    max: 1.0
    unit: "bool"

logic_thresholds:
  lg_extended_gear_pos_threshold: 95.0
  lg_retracted_gear_pos_threshold: 5.0
  lg_locked_pos_threshold: 90.0

physical_limits:
  lg_max_deploy_time_s: 8.0
  lg_max_retract_time_s: 6.0
  lg_door_open_deg: 45.0
  lg_door_closed_deg: 0.0

timing:
  lg_unlock_min_s: 0.5
  lg_deploy_full_s: 7.0
  lg_retract_full_s: 5.5
  lg_lock_confirm_s: 0.3

valid_outcomes:
  - "lg_extended"
  - "lg_retracted"
  - "lg_door_open"
  - "lg_locked"

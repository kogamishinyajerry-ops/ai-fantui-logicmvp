<style>
:root {
  --sim-bg:         #05111c;
  --sim-panel:      #0b1624;
  --sim-panel-hi:   #112238;
  --sim-border:     #1e3050;
  --sim-border-hi:  #2f4a72;
  --sim-text:       #c6d5e8;
  --sim-text-dim:   #6a7d95;
  --sim-text-mute:  #46597a;
  --sim-accent:     #00c8f5;
  --sim-active:     #00e5a0;
  --sim-warn:       #f5c518;
  --sim-fail:       #e05555;
  --sim-nav-offset: 64px;
}
* { box-sizing: border-box; }
html, body {
  margin: 0; padding: 0;
  background: var(--sim-bg);
  color: var(--sim-text);
  font-family: "Helvetica Neue", Arial, "PingFang SC", sans-serif;
  min-height: 100vh;
}
.sim-workstation {
  max-width: 1200px;
  margin: 0 auto;
  padding: 20px 20px 48px;
}
.sim-header {
  padding: 12px 16px;
  background: var(--sim-panel);
  border: 1px solid var(--sim-border);
  display: flex;
  justify-content: space-between;
  align-items: center;
  flex-wrap: wrap;
  gap: 10px;
  margin-bottom: 14px;
}
.sim-header h1 {
  margin: 0;
  font-size: 15px;
  font-weight: 500;
  color: var(--sim-accent);
  letter-spacing: 0.03em;
}
.sim-header-note {
  font-size: 11px;
  color: var(--sim-text-dim);
  font-family: 'Courier New', monospace;
}
.sim-panel {
  background: var(--sim-panel);
  border: 1px solid var(--sim-border);
  padding: 14px 16px;
  margin-bottom: 14px;
}
.sim-panel-title {
  margin: 0 0 10px;
  font-size: 12px;
  font-weight: 500;
  color: var(--sim-accent);
  letter-spacing: 0.04em;
  font-family: 'Courier New', monospace;
  display: flex;
  align-items: center;
  gap: 10px;
}
.sim-callout {
  color: var(--sim-text-dim);
  font-weight: 400;
  margin-right: 4px;
}

/* ── Controls ── */
.sim-controls {
  display: flex;
  align-items: center;
  gap: 12px;
  flex-wrap: wrap;
}
.sim-btn {
  font-family: 'Courier New', monospace;
  font-size: 12px;
  padding: 6px 16px;
  background: transparent;
  border: 1px solid var(--sim-border-hi);
  color: var(--sim-text);
  cursor: pointer;
  border-radius: 2px;
  transition: background 0.12s, color 0.12s, border-color 0.12s;
}
.sim-btn:hover         { background: rgba(0,200,245,0.08); border-color: var(--sim-accent); color: var(--sim-accent); }
.sim-btn[data-active]  { background: rgba(0,229,160,0.10); border-color: var(--sim-active); color: var(--sim-active); }
.sim-status {
  font-family: 'Courier New', monospace;
  font-size: 11px;
  color: var(--sim-text-dim);
  margin-left: auto;
}

/* ── Summary chips ── */
.sim-summary {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  margin-bottom: 10px;
}
.sim-summary-chip {
  font-family: 'Courier New', monospace;
  font-size: 10.5px;
  padding: 3px 10px;
  background: var(--sim-panel-hi);
  border: 1px solid var(--sim-border-hi);
  color: var(--sim-text-dim);
  border-radius: 2px;
}
.sim-summary-chip[data-highlight] {
  border-color: var(--sim-active);
  color: var(--sim-active);
  background: rgba(0,229,160,0.06);
}

/* ── Event cards ── */
.sim-events {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  margin-bottom: 12px;
}
.sim-event-card {
  font-family: 'Courier New', monospace;
  font-size: 10px;
  padding: 5px 10px;
  background: var(--sim-panel-hi);
  border-left: 3px solid var(--sim-border-hi);
  color: var(--sim-text-dim);
}
.sim-event-card .ev-time {
  color: var(--sim-accent);
  font-weight: 600;
  margin-right: 6px;
}
.sim-event-card .ev-label {
  color: var(--sim-text);
  margin-right: 6px;
}

/* ── Chart area ── */
.sim-chart-wrap {
  overflow-x: auto;
  background: var(--sim-panel-hi);
  border: 1px solid var(--sim-border);
  padding: 4px 0;
}
#sim-svg {
  display: block;
  font-family: 'Courier New', monospace;
}

/* ── Legend ── */
.sim-legend {
  display: flex;
  flex-wrap: wrap;
  gap: 10px;
  margin-top: 10px;
}
.sim-legend-item {
  display: flex;
  align-items: center;
  gap: 5px;
  font-family: 'Courier New', monospace;
  font-size: 10px;
  color: var(--sim-text-dim);
  cursor: pointer;
}
.sim-legend-item:hover { color: var(--sim-text); }
.sim-legend-swatch {
  width: 28px; height: 3px; border-radius: 1px;
}

/* ── Replay progress ── */
#sim-replay-progress {
  margin-top: 8px;
  font-family: 'Courier New', monospace;
  font-size: 11px;
  color: var(--sim-text-dim);
}
</style>

<main class="sim-workstation">
  <header class="sim-header">
    <h1>反推仿真面板 · 状态 vs 时间</h1>
    <span class="sim-header-note">GET /api/monitor-timeline — 受控着陆场景 · stateless 时序快照</span>
  </header>

  <section class="sim-panel" aria-labelledby="sim-ctrl-heading">
    <h2 id="sim-ctrl-heading" class="sim-panel-title">
      <span class="sim-callout">[控制]</span> 时间线控制
    </h2>
    <div class="sim-controls">
      <button type="button" id="sim-refresh-btn" class="sim-btn">⟳ 刷新数据</button>
      <button type="button" id="sim-replay-btn" class="sim-btn">▶ 重放</button>
      <button type="button" id="sim-stop-btn" class="sim-btn">■ 停止</button>
      <span id="sim-status" class="sim-status" role="status" aria-live="polite">加载中…</span>
    </div>
    <div id="sim-replay-progress"></div>
  </section>

  <section class="sim-panel" aria-labelledby="sim-events-heading">
    <h2 id="sim-events-heading" class="sim-panel-title">
      <span class="sim-callout">[关键时刻]</span> 事件注释
    </h2>
    <div id="sim-summary" class="sim-summary"></div>
    <div id="sim-events" class="sim-events"></div>
  </section>

  <section class="sim-panel" aria-labelledby="sim-chart-heading">
    <h2 id="sim-chart-heading" class="sim-panel-title">
      <span class="sim-callout">[时间轴]</span> 5 泳道示波器
      <span style="font-size:10px;color:var(--sim-text-mute);font-weight:400">INPUT / LOGIC / POWER / SENSOR / CMD</span>
    </h2>
    <div class="sim-chart-wrap">
      <svg id="sim-svg" viewBox="0 0 1000 470" width="1000" height="470"
           role="img" aria-label="反推逻辑时间轴五泳道示波器图"></svg>
    </div>
    <div id="sim-legend" class="sim-legend"></div>
  </section>
</main>

<script>
(function () {
  "use strict";

  const API_URL = "/api/monitor-timeline";
  const SVG_NS  = "http://www.w3.org/2000/svg";

  // ── SVG dimensions ──
  const W = 1000, H = 470;
  const PAD_LEFT = 52, PAD_RIGHT = 24, PAD_TOP = 12, PAD_BOTTOM = 26;
  const CHART_W = W - PAD_LEFT - PAD_RIGHT;
  const LANE_LABELS = ["INPUT", "LOGIC", "POWER", "SENSOR", "CMD"];
  const LANE_SERIES = {
    INPUT:  ["ra", "tra"],
    LOGIC:  ["sw1", "logic1", "sw2", "logic2", "logic3", "logic4"],
    POWER:  ["tls", "etrac"],
    SENSOR: ["vdt"],
    CMD:    ["eec", "pls", "pdu", "thr_lock"],
  };
  const LANE_H = 76; // per-lane height
  const LANE_GAP = 4;
  const TOTAL_LANE_H = (LANE_H + LANE_GAP) * LANE_LABELS.length;

  let payload = null;
  let replayTimer = null;
  let replayCursor = null;  // SVG line

  // ── Helpers ──
  function svgEl(tag, attrs) {
    const el = document.createElementNS(SVG_NS, tag);
    for (const [k, v] of Object.entries(attrs)) el.setAttribute(k, v);
    return el;
  }
  function scaleX(t, tStart, tEnd) {
    return PAD_LEFT + ((t - tStart) / (tEnd - tStart)) * CHART_W;
  }
  function laneTop(idx) {
    return PAD_TOP + idx * (LANE_H + LANE_GAP);
  }
  function scaleY(norm, top) {
    return top + LANE_H - norm * (LANE_H - 8);
  }

  // ── Fetch ──
  async function fetchData() {
    const statusEl = document.getElementById("sim-status");
    if (statusEl) statusEl.textContent = "加载中…";
    try {
      const res = await fetch(API_URL);
      if (!res.ok) throw new Error("HTTP " + res.status);
      payload = await res.json();
      render();
      if (statusEl) statusEl.textContent =
        `已加载 · ${payload.rows ? payload.rows.length : "?"} 采样点 · step=${payload.step_s}s`;
    } catch (e) {
      if (statusEl) statusEl.textContent = "加载失败：" + e.message;
    }
  }

  // ── Summary chips ──
  function renderSummary() {
    const el = document.getElementById("sim-summary");
    if (!el || !payload) return;
    el.innerHTML = "";
    const s = payload.timeline_summary || {};
    const chips = [
      { label: "TRA=-14° 锁", value: s.tra_reaches_lock_at_s != null ? s.tra_reaches_lock_at_s.toFixed(2) + "s" : "—" },
      { label: "VDT≥90%",    value: s.vdt_reaches_90_percent_at_s != null ? s.vdt_reaches_90_percent_at_s.toFixed(2) + "s" : "—" },
      { label: "L4 ready",   value: s.l4_ready_at_s != null ? s.l4_ready_at_s.toFixed(2) + "s" : "—" },
      { label: "THR_LOCK",   value: s.thr_lock_release_at_s != null ? s.thr_lock_release_at_s.toFixed(2) + "s" : "—" },
      { label: "时长",        value: (payload.time_end_s || 0).toFixed(1) + "s" },
    ];
    chips.forEach((c) => {
      const chip = document.createElement("div");
      chip.className = "sim-summary-chip";
      chip.textContent = `${c.label}: ${c.value}`;
      if (c.value !== "—") chip.setAttribute("data-highlight", "");
      el.appendChild(chip);
    });
  }

  // ── Event cards ──
  function renderEvents() {
    const el = document.getElementById("sim-events");
    if (!el || !payload) return;
    el.innerHTML = "";
    (payload.events || []).forEach((ev) => {
      const card = document.createElement("div");
      card.className = "sim-event-card";
      const timeSpan  = document.createElement("span");
      timeSpan.className = "ev-time";
      timeSpan.textContent = ev.time_s.toFixed(2) + "s";
      const labelSpan = document.createElement("span");
      labelSpan.className = "ev-label";
      labelSpan.textContent = ev.label;
      const detailSpan = document.createElement("span");
      detailSpan.textContent = ev.detail || "";
      card.appendChild(timeSpan);
      card.appendChild(labelSpan);
      card.appendChild(detailSpan);
      el.appendChild(card);
    });
  }

  // ── SVG chart ──
  function seriesMap() {
    if (!payload || !payload.series) return new Map();
    return new Map(payload.series.map((s) => [s.id, s]));
  }

  function render() {
    renderSummary();
    renderEvents();
    renderChart();
    renderLegend();
  }

  function renderChart() {
    const svg = document.getElementById("sim-svg");
    if (!svg || !payload) return;
    svg.innerHTML = "";

    const tStart = payload.time_start_s || 0;
    const tEnd   = payload.time_end_s   || 7;
    const smap   = seriesMap();

    // ── Background + lane bands ──
    svg.appendChild(svgEl("rect", { x: 0, y: 0, width: W, height: H, fill: "#0b1624" }));

    LANE_LABELS.forEach((lane, li) => {
      const top = laneTop(li);
      // lane background
      svg.appendChild(svgEl("rect", {
        x: PAD_LEFT, y: top, width: CHART_W, height: LANE_H,
        fill: li % 2 === 0 ? "#091520" : "#0b1624",
        stroke: "#1e3050", "stroke-width": "0.5",
      }));
      // lane label
      const lbl = svgEl("text", {
        x: PAD_LEFT - 4, y: top + LANE_H / 2 + 4,
        fill: "#46597a", "font-size": "9", "text-anchor": "end",
        "font-family": "Courier New, monospace",
      });
      lbl.textContent = lane;
      svg.appendChild(lbl);
    });

    // ── X-axis ticks ──
    const axisY = PAD_TOP + TOTAL_LANE_H + 4;
    for (let t = Math.ceil(tStart); t <= Math.floor(tEnd); t++) {
      const x = scaleX(t, tStart, tEnd);
      svg.appendChild(svgEl("line", {
        x1: x, y1: PAD_TOP, x2: x, y2: axisY,
        stroke: "#1e3050", "stroke-width": "0.5", "stroke-dasharray": "2,4",
      }));
      const tick = svgEl("text", {
        x, y: axisY + 12,
        fill: "#6a7d95", "font-size": "9", "text-anchor": "middle",
        "font-family": "Courier New, monospace",
      });
      tick.textContent = t + "s";
      svg.appendChild(tick);
    }

    // ── Event annotations ──
    (payload.events || []).forEach((ev) => {
      const x = scaleX(ev.time_s, tStart, tEnd);
      svg.appendChild(svgEl("line", {
        x1: x, y1: PAD_TOP, x2: x, y2: axisY,
        stroke: "#f5c518", "stroke-width": "0.8", "stroke-dasharray": "3,3", opacity: "0.55",
      }));
      const evLbl = svgEl("text", {
        x: x + 2, y: PAD_TOP + 8,
        fill: "#f5c518", "font-size": "8", opacity: "0.8",
        "font-family": "Courier New, monospace",
      });
      evLbl.textContent = ev.label;
      svg.appendChild(evLbl);
    });

    // ── Series polylines ──
    LANE_LABELS.forEach((lane, li) => {
      const top = laneTop(li);
      const ids = LANE_SERIES[lane] || [];
      ids.forEach((id) => {
        const s = smap.get(id);
        if (!s || !s.samples || s.samples.length === 0) return;

        const vMin = s.display_min ?? 0;
        const vMax = s.display_max ?? 1;
        const range = vMax - vMin || 1;
        const color = s.color || "#6a7d95";

        // Y-axis label (right edge of lane, first series only)
        const isFirst = ids.indexOf(id) === 0;
        if (isFirst) {
          const yLbl = svgEl("text", {
            x: W - PAD_RIGHT + 2, y: top + 10,
            fill: "#46597a", "font-size": "8", "text-anchor": "start",
            "font-family": "Courier New, monospace",
          });
          yLbl.textContent = s.unit || "";
          svg.appendChild(yLbl);
        }

        // Build polyline points
        const pts = s.samples.map(([t, v]) => {
          const x = scaleX(t, tStart, tEnd);
          const norm = Math.max(0, Math.min(1, (v - vMin) / range));
          const y = scaleY(norm, top);
          return `${x.toFixed(1)},${y.toFixed(1)}`;
        });
        const pl = svgEl("polyline", {
          points: pts.join(" "),
          stroke: color,
          "stroke-width": "1.4",
          fill: "none",
          opacity: "0.9",
        });
        svg.appendChild(pl);

        // Series label at end of line
        const last = s.samples[s.samples.length - 1];
        if (last) {
          const [lt, lv] = last;
          const lx = scaleX(lt, tStart, tEnd);
          const norm = Math.max(0, Math.min(1, (lv - vMin) / range));
          const ly = scaleY(norm, top);
          const slbl = svgEl("text", {
            x: lx - 2, y: ly - 3,
            fill: color, "font-size": "8", "text-anchor": "end",
            "font-family": "Courier New, monospace", opacity: "0.8",
          });
          slbl.textContent = s.label;
          svg.appendChild(slbl);
        }
      });
    });

    // ── Replay cursor (hidden initially) ──
    replayCursor = svgEl("line", {
      x1: PAD_LEFT, y1: PAD_TOP,
      x2: PAD_LEFT, y2: PAD_TOP + TOTAL_LANE_H,
      stroke: "#00e5a0", "stroke-width": "1.2", opacity: "0",
    });
    svg.appendChild(replayCursor);
  }

  // ── Legend ──
  function renderLegend() {
    const el = document.getElementById("sim-legend");
    if (!el || !payload) return;
    el.innerHTML = "";
    const smap = seriesMap();
    LANE_LABELS.forEach((lane) => {
      (LANE_SERIES[lane] || []).forEach((id) => {
        const s = smap.get(id);
        if (!s) return;
        const item = document.createElement("div");
        item.className = "sim-legend-item";
        const swatch = document.createElement("div");
        swatch.className = "sim-legend-swatch";
        swatch.style.background = s.color || "#6a7d95";
        const label = document.createElement("span");
        label.textContent = s.label + (s.unit ? " (" + s.unit + ")" : "");
        item.appendChild(swatch);
        item.appendChild(label);
        el.appendChild(item);
      });
    });
  }

  // ── Replay animation ──
  function startReplay() {
    if (!payload || !replayCursor) return;
    stopReplay();
    const tStart = payload.time_start_s || 0;
    const tEnd   = payload.time_end_s   || 7;
    const durationMs = (tEnd - tStart) * 1000;  // 1s real = 1s replay
    let startTs = null;

    replayCursor.setAttribute("opacity", "0.85");
    const progress = document.getElementById("sim-replay-progress");

    function step(ts) {
      if (!startTs) startTs = ts;
      const elapsed = ts - startTs;
      const frac = Math.min(1, elapsed / durationMs);
      const t = tStart + frac * (tEnd - tStart);
      const x = scaleX(t, tStart, tEnd);
      replayCursor.setAttribute("x1", x);
      replayCursor.setAttribute("x2", x);
      if (progress) progress.textContent = `t = ${t.toFixed(2)}s`;
      if (frac < 1) {
        replayTimer = requestAnimationFrame(step);
      } else {
        replayCursor.setAttribute("opacity", "0.3");
        if (progress) progress.textContent = `t = ${tEnd.toFixed(2)}s  ▶ 完成`;
      }
    }
    replayTimer = requestAnimationFrame(step);
  }

  function stopReplay() {
    if (replayTimer) { cancelAnimationFrame(replayTimer); replayTimer = null; }
    if (replayCursor) replayCursor.setAttribute("opacity", "0");
    const progress = document.getElementById("sim-replay-progress");
    if (progress) progress.textContent = "";
  }

  // ── Boot ──
  document.getElementById("sim-refresh-btn").addEventListener("click", fetchData);
  document.getElementById("sim-replay-btn").addEventListener("click", startReplay);
  document.getElementById("sim-stop-btn").addEventListener("click", stopReplay);

  fetchData();
})();
</script>

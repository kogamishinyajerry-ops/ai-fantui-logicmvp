[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.build_meta"

[project]
name = "well-harness"
version = "0.1.0"
description = "Simulation harness for thrust reverser deploy control logic"
readme = "README.md"
requires-python = ">=3.9"

[tool.setuptools.package-dir]
"" = "src"

[tool.setuptools.packages.find]
where = ["src"]

# P43 Workflow Automaton — Machine-Readable Specification
# Authority: P43-00 §3c · P43-workflow-automaton-contract.md §1
# Version: 1.0 · 2026-04-21
# Used by: tests/test_p43_workflow_automaton.py

version: 1
generated_at_utc: "2026-04-21T18:00:00Z"
source_doc: "docs/P43-workflow-automaton-contract.md"

# ──────────────────────────────────────────────
# STATES
# ──────────────────────────────────────────────
states:
  INIT:
    kind: initial
    description: "Workbench loaded, no document imported"
  INTAKED:
    kind: normal
    description: "Document received; pre-processing queued"
  PARSING:
    kind: normal
    description: "LLM/parser extracting ambiguities"
  AWAITING_ANSWERS:
    kind: normal
    description: "≥1 open clarification question pending operator"
  FREEZING:
    kind: normal
    description: "All clarifications answered; freeze guard in progress"
  FROZEN:
    kind: normal
    description: "Frozen spec SHA-locked and immutable"
  GENERATING:
    kind: normal
    description: "Panel SVG + wiring scaffold generation in progress"
  PANEL_READY:
    kind: normal
    description: "Generated panel rendered; no active edits"
  WIRING:
    kind: normal
    description: "Operator actively editing signal wiring"
  DEBUGGING:
    kind: normal
    description: "Snapshot submitted; diff/validation active"
  ANNOTATING:
    kind: normal
    description: "Operator adding semantic annotations"
  ITERATING:
    kind: transient
    description: "reiterate fired; MUST resolve to PARSING within same tick"
    resolves_to: PARSING
  APPROVING:
    kind: transient
    description: "final_approve side-effect sequence in flight"
    resolves_to: APPROVED
    timeout_s: 30
    timeout_action: rollback_to_pre_approving
  APPROVED:
    kind: terminal_normal
    description: "All side-effects committed; workbench complete"
  ARCHIVING:
    kind: transient
    description: "archive event fired; bundle being written"
    resolves_to: ARCHIVED
  ARCHIVED:
    kind: terminal_normal
    description: "Bundle + manifest committed; read-only"
  ERROR:
    kind: terminal_fault
    description: "Unrecoverable fault; operator session reset required"

# ──────────────────────────────────────────────
# EVENTS
# ──────────────────────────────────────────────
events:
  import_doc:
    idempotency: non_idempotent
    dedup_token: "SHA-256(file_bytes)"
    transitions:
      - from: INIT
        to: INTAKED
        guard: "file_size > 0 AND mime IN {application/pdf, application/vnd.openxmlformats-officedocument.wordprocessingml.document}"
        on_guard_fail: stay_INIT
      - from: INIT
        to: ERROR
        guard: "parser_raises OR returns_null"
        error_code: pdf_extract_failure

  answer_question:
    idempotency: idempotent
    dedup_token: "(question_id, answer)"
    transitions:
      - from: AWAITING_ANSWERS
        to: AWAITING_ANSWERS
        guard: "remaining_open_questions > 0 AFTER this answer"
      - from: AWAITING_ANSWERS
        to: FREEZING
        guard: "all questions answered OR all waived with operator_alias"

  confirm_freeze:
    idempotency: idempotent
    dedup_token: "frozen_spec_sha"
    transitions:
      - from: AWAITING_ANSWERS
        to: FROZEN
        guard: "all_questions_answered OR all_waived_with_alias"
        side_effects:
          - emit_frozen_spec_json
          - compute_sha256
          - write_traceability_matrix_skeleton
      - from: AWAITING_ANSWERS
        to: ERROR
        guard: "NOT (all_answered OR all_waived)"
        error_code: ambiguity_unresolved
      - from: FREEZING
        to: FROZEN
        guard: null
        side_effects:
          - emit_frozen_spec_json
          - compute_sha256
          - write_traceability_matrix_skeleton

  start_gen:
    idempotency: non_idempotent
    dedup_token: "(frozen_spec_sha, gen_round_counter)"
    transitions:
      - from: FROZEN
        to: GENERATING
        guard: "frozen_spec_sha IS NOT NULL"
      - from: GENERATING
        to: ERROR
        guard: "llm_fails OR returns_malformed_svg"
        error_code: regen_failure
        retry_limit: 3

  wire_change:
    idempotency: idempotent
    dedup_token: "(node_id, signal_value)"
    transitions:
      - from: [PANEL_READY, WIRING, DEBUGGING]
        to: WIRING
        guard: "payload non-empty AND node_id IN spec.components UNION spec.logic_nodes"

  submit_snapshot:
    idempotency: non_idempotent
    dedup_token: "SHA-256(sorted_snapshot_json)"
    transitions:
      - from: [WIRING, DEBUGGING]
        to: PANEL_READY
        guard: "evaluate_snapshot returns no validation errors"
      - from: [WIRING, DEBUGGING]
        to: DEBUGGING
        guard: "evaluate_snapshot returns validation errors"

  annotate:
    idempotency: idempotent
    dedup_token: "(node_id, text)"
    transitions:
      - from: [PANEL_READY, WIRING, ANNOTATING]
        to: ANNOTATING
        guard: "annotation has node_id AND text fields"

  reiterate:
    idempotency: non_idempotent
    dedup_token: null
    destructive: true
    r3_invariant: "MUST NOT write back to frozenSpec"
    transitions:
      - from: [FROZEN, GENERATING, PANEL_READY, WIRING, DEBUGGING, ANNOTATING, ITERATING]
        to: ITERATING
        guard: "operator_confirmed"
        side_effects:
          - clear_draft_design_state
          - reset_gen_round_counter
      - from: ITERATING
        to: PARSING
        guard: null
        note: "synchronous resolution — no async between ITERATING and PARSING"

  final_approve:
    idempotency: non_idempotent
    dedup_token: "(system_id, frozen_spec_sha)"
    transitions:
      - from: [PANEL_READY, ANNOTATING]
        to: APPROVING
        guard: "panel has >= 1 truth-tracked node AND no unresolved validation errors"
      - from: APPROVING
        to: APPROVED
        guard: "all 4 side-effect steps succeeded"
      - from: APPROVING
        to: ERROR
        guard: "any side-effect step failed"
        error_code: partial_approve_rollback
    side_effect_sequence:
      - step: 1
        action: "localStorage workspace state key → APPROVING"
      - step: 2
        action: "server-side adapter.emit_adapter() + SYSTEM_REGISTRY row append"
        atomic: true
      - step: 3
        action: "workbench_bundle.archive_workbench_bundle() manifest append"
        atomic: true
      - step: 4
        action: "localStorage workspace state key → APPROVED; delete draft_design_state key"
    rollback_on_failure: "revert to pre-step-1 state (PANEL_READY or ANNOTATING)"

  archive:
    idempotency: non_idempotent
    dedup_token: "(system_id, frozen_spec_sha, archive_timestamp)"
    transitions:
      - from: APPROVED
        to: ARCHIVING
        guard: "workbench_bundle.archive_workbench_bundle callable AND output path writable"
      - from: ARCHIVING
        to: ARCHIVED
        guard: "bundle write succeeded"
      - from: ARCHIVING
        to: ERROR
        guard: "bundle write failed after 1 retry"
        error_code: archive_write_failure

# ──────────────────────────────────────────────
# TRANSITION TABLE (machine-verifiable)
# Format: legal / illegal / conditional
# ──────────────────────────────────────────────

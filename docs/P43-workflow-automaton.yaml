  AWAITING_ANSWERS: {import_doc: I, answer_question: L, confirm_freeze: C, start_gen: I, wire_change: I, submit_snapshot: I, annotate: I, reiterate: I, final_approve: I, archive: I}
  FREEZING:        {import_doc: I, answer_question: I, confirm_freeze: L, start_gen: I, wire_change: I, submit_snapshot: I, annotate: I, reiterate: I, final_approve: I, archive: I}
  FROZEN:          {import_doc: I, answer_question: I, confirm_freeze: I, start_gen: L, wire_change: I, submit_snapshot: I, annotate: I, reiterate: L, final_approve: I, archive: I}

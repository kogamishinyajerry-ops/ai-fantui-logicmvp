  WIRING:          {import_doc: I, answer_question: I, confirm_freeze: I, start_gen: I, wire_change: L, submit_snapshot: L, annotate: L, reiterate: L, final_approve: I, archive: I}
  DEBUGGING:       {import_doc: I, answer_question: I, confirm_freeze: I, start_gen: I, wire_change: L, submit_snapshot: L, annotate: I, reiterate: L, final_approve: I, archive: I}
  ANNOTATING:      {import_doc: I, answer_question: I, confirm_freeze: I, start_gen: I, wire_change: I, submit_snapshot: I, annotate: L, reiterate: L, final_approve: L, archive: I}
  ITERATING:       {import_doc: I, answer_question: I, confirm_freeze: I, start_gen: I, wire_change: I, submit_snapshot: I, annotate: I, reiterate: L, final_approve: I, archive: I}
  APPROVING:       {import_doc: I, answer_question: I, confirm_freeze: I, start_gen: I, wire_change: I, submit_snapshot: I, annotate: I, reiterate: I, final_approve: I, archive: I}
  APPROVED:        {import_doc: I, answer_question: I, confirm_freeze: I, start_gen: I, wire_change: I, submit_snapshot: I, annotate: I, reiterate: I, final_approve: I, archive: L}
  ARCHIVING:       {import_doc: I, answer_question: I, confirm_freeze: I, start_gen: I, wire_change: I, submit_snapshot: I, annotate: I, reiterate: I, final_approve: I, archive: I}
  ARCHIVED:        {import_doc: I, answer_question: I, confirm_freeze: I, start_gen: I, wire_change: I, submit_snapshot: I, annotate: I, reiterate: I, final_approve: I, archive: I}
  ERROR:           {import_doc: I, answer_question: I, confirm_freeze: I, start_gen: I, wire_change: I, submit_snapshot: I, annotate: I, reiterate: I, final_approve: I, archive: I}

# C (conditional) entries for AWAITING_ANSWERS.confirm_freeze:
conditional_guards:
  AWAITING_ANSWERS.confirm_freeze: "all_questions_answered OR (all_waived AND operator_alias IS NOT NULL)"

# ──────────────────────────────────────────────
# ERROR TAXONOMY
# ──────────────────────────────────────────────
error_taxonomy:
  pdf_extract_failure:
    trigger: "import_doc parser returns null or raises"
    recovery: "reset_to_INIT; prompt re-upload"
  ambiguity_unresolved:
    trigger: "confirm_freeze guard fails — unanswered questions"
    recovery: "return_to_AWAITING_ANSWERS; surface unresolved question_ids"
  regen_failure:
    trigger: "start_gen LLM call fails or malformed SVG; after 3 retries"
    recovery: "stay_FROZEN; frozen spec preserved"
    retry_limit: 3
  iteration_overflow:
    trigger: "reiterate counter > 10 without final_approve"
    recovery: "block_reiterate; require operator acknowledgment"
    threshold: 10
  schema_drift:
    trigger: "generated node IDs NOT ⊆ spec.components ∪ spec.logic_nodes"
    recovery: "abort_panel_render; return_to_FROZEN; emit drift report"
  partial_approve_rollback:
    trigger: "final_approve side-effect step 2, 3, or 4 fails"
    recovery: "rollback to pre-step-1 state; log failed_step; no partial commit"
  archive_write_failure:
    trigger: "archive bundle write fails after 1 retry"
    recovery: "preserve APPROVED state; prompt manual retry"
    retry_limit: 1
  external_state_delete:
    trigger: "localStorage key deleted externally during active session"
    recovery: "emit warning; prompt operator reload from last bundle"

# ──────────────────────────────────────────────
# PERSISTENCE MODEL
# ──────────────────────────────────────────────
persistence:
  sources:
    - id: localStorage
      owner: "src/well_harness/static/workbench.js"
      key: workbench_workspace
      write_protocol: "single-key atomic localStorage.setItem"
      contains: [current_state, draft_design_state, frozen_spec_sha, annotation_cache, ui_toggle_state]
    - id: bundle_manifest
      owner: "src/well_harness/workbench_bundle.py"
      write_protocol: "archive_workbench_bundle atomic append-only"
      contains: [bundle_file_list, sha_checksums, system_id, archive_timestamp, operator_alias]
  prohibited_third_sources:
    - state.yaml
    - new SQLite table
    - server-side in-memory session dict (new module)
    - workbench/orchestrator.py


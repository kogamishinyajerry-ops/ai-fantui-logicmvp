name: GSD Automation Loop

on:
  workflow_dispatch:
    inputs:
      opus_gate:
        description: "Move the Opus 4.6 review gate to Awaiting Opus 4.6 after successful checks"
        required: false
        default: "false"
  push:
    branches:
      - main

jobs:
  # Stage 1: Run regression tests
  regression:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      PYTHONPATH: src
    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Run regression tests
        run: python3 -m unittest discover -s tests -p test_gsd_notion_sync.py -q

  # Stage 2: Run full GSD validation suite
  validation:
    runs-on: ubuntu-latest
    needs: regression
    permissions:
      contents: read
    env:
      PYTHONPATH: src
    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install jsonschema
        shell: bash
        run: python3 -m pip install --disable-pip-version-check jsonschema

      - name: Run GSD validation suite
        run: python3 tools/run_gsd_validation_suite.py --format json

  # Stage 3: Sync repo docs to Notion (non-blocking)
  notion-sync:
    runs-on: ubuntu-latest
    needs: validation
    permissions:
      contents: read
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
      NOTION_API_KEY: ${{ secrets.NOTION_API_KEY }}
      PYTHONPATH: src
    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Sync repo docs to Notion
        run: |
          python3 tools/gsd_notion_sync.py sync-repo-docs --format json --cwd .
        continue-on-error: true

      - name: Prepare Opus review brief
        if: always()
        run: |
          OPUS_CMD="--dry-run"
          if [[ "${{ github.event.inputs.opus_gate }}" == "true" ]]; then
            OPUS_CMD="--activate-gate"
          fi
          python3 tools/gsd_notion_sync.py prepare-opus-review $OPUS_CMD --format json
        continue-on-error: true

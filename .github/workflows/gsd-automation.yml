name: GSD Automation Loop

on:
  workflow_dispatch:
    inputs:
      opus_gate:
        description: "Move the Opus 4.6 review gate to Awaiting Opus 4.6 after successful checks"
        required: false
        default: "false"
  push:
    branches:
      - main

jobs:
  gsd-automation:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      NOTION_API_KEY: ${{ secrets.NOTION_API_KEY }}
      PYTHONPATH: src
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install optional validation dependency
        shell: bash
        run: python3 -m pip install --disable-pip-version-check jsonschema

      - name: Run GSD automation and sync to Notion
        shell: bash
        run: |
          OPUS_FLAG=""
          if [[ "${{ github.event.inputs.opus_gate }}" == "true" ]]; then
            OPUS_FLAG="--opus-gate"
          fi

          python3 tools/gsd_notion_sync.py run \
            --title "GitHub GSD automation $GITHUB_RUN_ID" \
            --plan-id "P1-01 建立自动执行 / QA 回写闭环" \
            --command "PYTHONPATH=src python3 -m unittest discover -s tests -p 'test_*.py'" \
            --command "PYTHONPATH=src python3 tools/validate_debug_json_schema.py --format json" \
            --command "PYTHONPATH=src python3 tools/validate_demo_answer_schema.py --format json" \
            --command "PYTHONPATH=src python3 tools/validate_validation_report_schema.py --format json" \
            --command "PYTHONPATH=src python3 tools/validate_validation_schema_runner_report_schema.py --format json" \
            --command "PYTHONPATH=src python3 tools/validate_validation_schema_checker_report_schema.py --format json" \
            $OPUS_FLAG

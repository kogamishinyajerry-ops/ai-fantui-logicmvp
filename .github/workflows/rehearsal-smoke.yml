name: rehearsal-smoke

# Nightly + manual smoke lane for P20.2 dress rehearsal.
# Explicitly NON-BLOCKING for main: no push/PR triggers, no required-check gating.
# Purpose: catch demo-path regressions early without ever red-marking main CI.

on:
  schedule:
    # 每日 UTC 18:00 (北京时间 02:00) 跑一次烟雾
    - cron: "0 18 * * *"
  workflow_dispatch:
    inputs:
      mode:
        description: "rehearsal mode"
        required: false
        default: "smoke"
        type: choice
        options:
          - smoke
          - full

permissions:
  contents: read

jobs:
  rehearsal-smoke:
    # Intentionally no branch protection hook; this job's outcome does not
    # affect merge eligibility for main. It only surfaces a status annotation.
    runs-on: ubuntu-latest
    timeout-minutes: 8
    continue-on-error: true  # never block downstream workflows even on failure
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install project (test extras)
        run: |
          python -m pip install --upgrade pip
          pip install -e .
          # test-only local dep for /api/* probing (bs4 not needed by smoke itself,
          # but keeps parity with tests/e2e/ if a future step reuses it)
          pip install beautifulsoup4

      - name: Run dress rehearsal
        id: rehearse
        env:
          REHEARSAL_MODE: ${{ github.event.inputs.mode || 'smoke' }}
        run: |
          set -euo pipefail
          if [ "${REHEARSAL_MODE}" = "full" ]; then
            python scripts/dress_rehearsal.py
          else
            python scripts/dress_rehearsal.py --smoke
          fi

      - name: Upload rehearsal artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: rehearsal-${{ github.run_id }}
          path: runs/dress_rehearsal_*/
          if-no-files-found: warn
          retention-days: 14
